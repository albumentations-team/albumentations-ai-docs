# Tool config only (ruff, pytest, mypy). Not a Python distribution — use `uv run --no-project pytest`.

[tool.ruff]
# Exclude a variety of commonly ignored directories.
target-version = "py313"
line-length = 120
indent-width = 4
# Assume Python 3.13
exclude = [
  ".bzr",
  ".direnv",
  ".eggs",
  ".git",
  ".git-rewrite",
  ".hg",
  ".ipynb_checkpoints",
  ".mypy_cache",
  ".nox",
  ".pants.d",
  ".pyenv",
  ".pytest_cache",
  ".pytype",
  ".ruff_cache",
  ".svn",
  ".tox",
  ".venv",
  ".vscode",
  "__pypackages__",
  "_build",
  "buck-out",
  "build",
  "dist",
  "node_modules",
  "site",
  "site-packages",
  "tests",
  "venv",
]
format.indent-style = "space"
# Like Black, respect magic trailing commas.
format.quote-style = "double"
# Like Black, indent with spaces, rather than tabs.
format.line-ending = "auto"
format.skip-magic-trailing-comma = false
# Like Black, automatically detect the appropriate line ending.
lint.select = [ "ALL" ]
lint.ignore = []
# Allow fix for all enabled rules (when `--fix`) is provided.
lint.explicit-preview-rules = true
# Ignore missing docstrings in __init__.py files
lint.per-file-ignores."**/__init__.py" = [ "D104" ]
lint.fixable = [ "ALL" ]
lint.unfixable = []
# Allow unused variables when underscore-prefixed.
lint.dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"
# Like Black, use double quotes for strings.
lint.pydocstyle.convention = "google"

[tool.pytest]
ini_options.pythonpath = [ "scripts" ]

[tool.mypy]
python_version = "3.13"
ignore_missing_imports = true
follow_imports = "silent"
warn_redundant_casts = true
warn_unused_ignores = true
disallow_any_generics = true
check_untyped_defs = true
no_implicit_reexport = true
# for strict mypy: (this is the tricky one :-))
disallow_untyped_defs = true

[tool.google_docstring_checker]
paths = [ "scripts" ]
require_param_types = true
check_type_consistency = true
verbose = true
